[package]
name = "remin"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[build-dependencies]
slint-build = "1.17.0"

[dependencies]
anyhow = "1.0.103"
enigo = { version = "0.6.1", features = ["wayland"] }
log = "0.4.33"
pretty_env_logger = "0.5.0"
janck = { path = "../janck" }
slint = { version = "1.17.0", features = ["unstable-wgpu-29", "renderer-femtovg-wgpu"] }
chrono = "0.4.45"
fps_ticker = "1.0.0"
wincode = { version = "0.5.5", features = ["derive"] }
netnet = { version = "0.1.0", path = "../netnet" }
openh264 = "0.9.3"
gpu-video = "0.4.0"

# always use release profile for janck
# settings from https://doc.rust-lang.org/cargo/reference/profiles.html#release
[profile.dev.package.janck]
opt-level = 3
# split-debuginfo = '...'  # Platform-specific.
strip = "none"
debug-assertions = false
overflow-checks = false
incremental = false
codegen-units = 16
