[package]
name = "remin"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[build-dependencies]
slint-build = "1.17.0"

[dependencies]
anyhow = "1.0.103"
enigo = { version = "0.6.1", features = ["wayland"] }
log = "0.4.33"
pretty_env_logger = "0.5.0"
janck = { path = "../janck" }
slint = "1.17.0"
chrono = "0.4.45"
fps_ticker = "1.0.0"
rustc-hash = "2.1.3"
wincode = { version = "0.5.5", features = ["derive"] }

[profile.dev.package.janck]
opt-level = 3
